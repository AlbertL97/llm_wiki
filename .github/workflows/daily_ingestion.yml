name: Daily Automated Wiki Ingestion

on:
  schedule:
    # Run daily at 10:00 AM UTC
    - cron: '0 10 * * *'
  workflow_dispatch:
    # Allow manual execution via the Actions tab

permissions:
  contents: write

jobs:
  ingest-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node Dependencies
        run: |
          cd website
          npm ci

      - name: Run Ingestion & Crawler
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scratch/cloud_ingestion.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Check if there are any changes (wiki pages, index, log, graph.json, wiki_db.json)
          if [ -n "$(git status --porcelain)" ]; then
            echo "Changes detected, committing and pushing..."
            git add raw/ wiki/ website/src/graph.json website/src/wiki_db.json
            git commit -m "[Auto-Ingest] Update wiki and knowledge graph with newly crawled resources"
            git push origin main
          else
            echo "No changes detected, skipping commit."
          fi
