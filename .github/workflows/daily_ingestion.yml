name: Daily Automated Wiki Ingestion

on:
  schedule:
    # Run daily at 10:00 AM UTC
    - cron: '0 10 * * *'
  workflow_dispatch:
    # Allow manual execution via the Actions tab

permissions:
  contents: write

jobs:
  ingest-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node Dependencies
        run: |
          cd website
          npm ci

      - name: Run Ingestion & Crawler
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scratch/cloud_ingestion.py

      - name: Build and Deploy Website
        id: build_step
        run: |
          # Only build and deploy if there are changes detected in the wiki
          if [ -n "$(git status --porcelain)" ]; then
            echo "Changes detected! Building Vite application..."
            cd website
            npm run build
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No changes, skipping website build."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Push Static Assets to GitHub Pages
        # Only run this step if changes were detected in the previous step
        if: github.ref == 'refs/heads/main' && steps.build_step.outputs.has_changes == 'true'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: website/dist
          branch: gh-pages
          clean: true

      - name: Commit and Push Source Changes to Main
        if: steps.build_step.outputs.has_changes == 'true'
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Commit the updated source markdown andCompiled JSON DBs back to main
          echo "Committing source changes back to main..."
          git add raw/ wiki/ website/src/graph.json website/src/wiki_db.json
          git commit -m "[Auto-Ingest] Update wiki and knowledge graph with newly crawled resources"
          git push origin main

